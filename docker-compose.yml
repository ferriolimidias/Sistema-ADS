services:
  db:
    image: postgres:15
    container_name: ferrioli_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-ferrioli_traffic}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    container_name: ferrioli_redis
    ports:
      - "6379:6379"

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ferrioli_api
    depends_on:
      - db
      - redis
    env_file:
      - .env
    ports:
      - "8000:8000"

  celery_worker:
    build: .
    command: celery -A workers.celery_app worker --loglevel=info
    depends_on:
      - db
      - redis
    env_file:
      - .env

  celery_beat:
    build: .
    command: celery -A workers.celery_app beat --loglevel=info
    depends_on:
      - db
      - redis
    env_file:
      - .env

volumes:
  postgres_data:
